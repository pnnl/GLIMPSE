<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLIMPSE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #041422;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #041422 0%, #0A2E18 50%, #041422 100%);
      background-size: 300% 300%;
      animation: gradientMove 5s ease infinite;
    }

    @keyframes gradientMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      animation: pulse 5s ease-in-out infinite;
    }

    .orb-green {
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, #52B040 0%, transparent 70%);
      bottom: -120px;
      left: -80px;
      opacity: 0.12;
    }

    .orb-blue {
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, #1B75BC 0%, transparent 70%);
      top: -100px;
      right: -60px;
      opacity: 0.12;
      animation-delay: 2.5s;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.08; transform: scale(1); }
      50%       { opacity: 0.18; transform: scale(1.08); }
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      animation: fadeSlideIn 0.7s ease-out forwards;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 360px;
      height: auto;
      filter:
        drop-shadow(0 0 20px rgba(82, 176, 64, 0.30))
        drop-shadow(0 0 40px rgba(27, 117, 188, 0.15));
    }

    .dots {
      display: flex;
      gap: 9px;
      animation: fadeIn 0.4s ease-out 0.5s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
    }

    .dot:nth-child(1) { background: #52B040; animation-delay: 0s; }
    .dot:nth-child(2) { background: #1B75BC; animation-delay: 0.22s; }
    .dot:nth-child(3) { background: #52B040; animation-delay: 0.44s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.55); opacity: 0.35; }
      40%            { transform: scale(1);    opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="orb orb-green"></div>
  <div class="orb orb-blue"></div>

  <div class="content">
    <img id="logo" class="logo" src="" alt="GLIMPSE" />
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const logoUrl = params.get('logoUrl');
    if (logoUrl) document.getElementById('logo').src = logoUrl;
  </script>
</body>
</html>

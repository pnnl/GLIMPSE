<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Incoming light arrows (solar radiation) -->
  <!-- Arrow 1 -->
  <line x1="20" y1="30" x2="70" y2="80" stroke="black" stroke-width="3"/>
  <polygon points="70,80 58,76 66,68" fill="black"/>
  
  <!-- Arrow 2 -->
  <line x1="20" y1="70" x2="70" y2="120" stroke="black" stroke-width="3"/>
  <polygon points="70,120 58,116 66,108" fill="black"/>
  
  <!-- PV Panel body (rectangle) -->
  <rect x="76" y="50" width="160" height="110" 
        fill="white" stroke="black" stroke-width="3"/>
  
  <!-- Cell grid (2 rows × 4 columns) -->
  <line x1="76" y1="105" x2="236" y2="105" stroke="black" stroke-width="2"/>
  <line x1="116" y1="50" x2="116" y2="160" stroke="black" stroke-width="2"/>
  <line x1="156" y1="50" x2="156" y2="160" stroke="black" stroke-width="2"/>
  <line x1="196" y1="50" x2="196" y2="160" stroke="black" stroke-width="2"/>
  
  <!-- Diagonal line inside each cell (diode symbol hint) -->
  <!-- Optional: represents PV cells as diodes -->
  
  <!-- Bottom connection (DC output) -->
  <line x1="156" y1="160" x2="156" y2="210" stroke="black" stroke-width="3"/>
  
  <!-- DC symbol -->
  <line x1="136" y1="220" x2="176" y2="220" stroke="black" stroke-width="3"/>
  <line x1="141" y1="232" x2="171" y2="232" stroke="black" stroke-width="3" stroke-dasharray="6,4"/>
  
  <!-- Connection terminal -->
  <circle cx="156" cy="248" r="6" fill="black"/>
  <line x1="156" y1="232" x2="156" y2="248" stroke="black" stroke-width="3"/>
</svg>

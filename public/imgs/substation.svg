<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Left connection point (incoming HV line) -->
  <circle cx="20" cy="128" r="6" fill="black"/>
  <line x1="20" y1="128" x2="50" y2="128" stroke="black" stroke-width="9"/>
  
  <!-- Substation body (square) -->
  <rect x="50" y="50" width="156" height="156" 
        fill="none" stroke="black" stroke-width="9"/>
  
  <!-- Inner square (denotes enclosed facility) -->
  <rect x="62" y="62" width="132" height="132" 
        fill="none" stroke="black" stroke-width="6"/>
  
  <!-- Label -->
  <text x="128" y="138" text-anchor="middle" 
        font-family="Arial, sans-serif" font-size="36" 
        font-weight="bold" fill="black">SS</text>
  
  <!-- Right connection point (outgoing LV line) -->
  <line x1="206" y1="128" x2="236" y2="128" stroke="black" stroke-width="9"/>
  <circle cx="236" cy="128" r="6" fill="black"/>
</svg>

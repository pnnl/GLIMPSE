<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Left connection point (primary winding) -->
  <circle cx="20" cy="128" r="6" fill="black"/>
  <line x1="20" y1="128" x2="70" y2="128" stroke="black" stroke-width="3"/>
  
  <!-- Primary winding (left circle) -->
  <circle cx="104" cy="128" r="38" 
          fill="none" stroke="black" stroke-width="3"/>
  
  <!-- Secondary winding (right circle, overlapping) -->
  <circle cx="158" cy="128" r="38" 
          fill="none" stroke="black" stroke-width="3"/>
  
  <!-- Right connection point (secondary winding) -->
  <line x1="196" y1="128" x2="236" y2="128" stroke="black" stroke-width="3"/>
  <circle cx="236" cy="128" r="6" fill="black"/>
</svg>

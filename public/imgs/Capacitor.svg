<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Top connection point (bus) -->
  <circle cx="128" cy="40" r="6" fill="black"/>
  
  <!-- Top connection line -->
  <line x1="128" y1="40" x2="128" y2="112" 
        stroke="black" stroke-width="4"/>
  
  <!-- Top plate -->
  <line x1="68" y1="112" x2="188" y2="112" 
        stroke="black" stroke-width="5"/>
  
  <!-- Bottom plate -->
  <line x1="68" y1="134" x2="188" y2="134" 
        stroke="black" stroke-width="5"/>
  
  <!-- Bottom connection line -->
  <line x1="128" y1="134" x2="128" y2="206" 
        stroke="black" stroke-width="4"/>
  
  <!-- Bottom terminal -->
  <circle cx="128" cy="206" r="6" fill="black"/>
</svg>
